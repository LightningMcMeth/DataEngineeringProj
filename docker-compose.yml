
x-airflow-common: &airflow-common
  build: .
  image: assignment4-airflow:2.10.5
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__TEST_CONNECTION: Enabled
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__WEBSERVER__SECRET_KEY: "change_me"
    AIRFLOW_CONN_MYSQL_GAME_DB: mysql://game_user:game_pass@mysql:3306/game_db
    PYTHONPATH: /opt/airflow
    DBT_PROFILES_DIR: /opt/airflow/dbt
    DBT_PROJECT_DIR: /opt/airflow/dbt
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./include:/opt/airflow/include
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - ./duckdb:/opt/airflow/duckdb
    - ./dbt:/opt/airflow/dbt
    - ./tests:/opt/airflow/tests
  depends_on:
    - postgres
    - mysql

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  mysql:
    command: --secure-file-priv=/docker-entrypoint-initdb.d --local-infile=1
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: game_db
      MYSQL_USER: game_user
      MYSQL_PASSWORD: game_pass
    ports:
      - "3307:3306"
    volumes:
      - ./include/sql/mysql:/docker-entrypoint-initdb.d

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  dbt-docs:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        cd /opt/airflow/dbt && \
        dbt docs generate && \
        dbt docs serve --host 0.0.0.0 --port 8081
    ports:
      - "8081:8081"

volumes:
  postgres-db-volume:
