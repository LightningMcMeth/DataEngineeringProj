name: game_analytics
version: "1.0.0"
config-version: 2

profile: game_analytics

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
# seeds прибрані: довідкові CSV тепер живуть у MinIO і вантажаться
# в схему `raw` DuckDB Airflow-таскою load_minio_to_duckdb.

clean-targets:
  - target
  - dbt_packages

models:
  game_analytics:
    raw:
      +materialized: view
      +schema: raw
    stg:
      +materialized: view
      +schema: stg
      +tags: ['hourly']
    mart:
      +materialized: table
      +schema: mart
      +tags: ['daily']