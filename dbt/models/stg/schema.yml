version: 2

models:
  - name: stg_events
    description: "Staging шар ігрових подій. Типи приведені, додано event_date."
    columns:
      - name: event_id
        description: "PK події."
        tests:
          - not_null
          - unique
      - name: event_name
        tests:
          - not_null
      - name: event_ts
        tests:
          - not_null
      - name: player_id
        tests:
          - not_null
      - name: platform
        tests:
          - accepted_values:
              values: ['ios', 'android', 'web', 'pc']
              config:
                severity: warn

  - name: stg_purchases
    description: "Staging шар транзакцій. Типи приведені, додано transaction_date."
    columns:
      - name: transaction_id
        description: "PK транзакції."
        tests:
          - not_null
          - unique
      - name: player_id
        tests:
          - not_null
      - name: transaction_ts
        tests:
          - not_null
      - name: gross_amount
        tests:
          - not_null
      - name: payment_status
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'pending', 'failed', 'refunded', 'cancelled']
              config:
                severity: warn
      - name: currency_code
        tests:
          - not_null
